<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Geometric Rush — an original rhythm platformer</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #05060f;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    background: #0a0c1e;
    box-shadow: 0 0 80px rgba(57,160,255,0.18);
    border-radius: 4px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="1280" height="720"></canvas></div>
<script src="js/constants.js"></script>
<script src="js/sim.js"></script>
<script src="js/levels.js"></script>
<script src="js/solutions.js"></script>
<script src="js/audio.js"></script>
<script src="js/render.js"></script>
<script src="js/editor.js"></script>
<script src="js/main.js"></script>
<script>
  GD_APP.boot(document.getElementById('game'));
</script>
</body>
</html>
